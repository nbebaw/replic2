# Default values for replic2.
# Override any of these with: helm install replic2 ./charts/replic2 --set key=value

# -- Number of replic2 pod replicas. Minimum 2 for HA leader election.
replicaCount: 2

image:
  # -- Container image repository
  repository: ghcr.io/nbebaw/replic2
  # -- Image tag. Defaults to the chart appVersion.
  tag: ""
  # -- Image pull policy
  pullPolicy: Always

# -- Image pull secret name for GHCR (or any private registry).
#    The secret must already exist in the namespace, or set imagePullSecret.create=true.
imagePullSecret:
  # -- Create the dockerconfigjson secret from the values below.
  #    Set to false if you create the secret out-of-band.
  create: true
  # -- Name of the secret
  name: ghcr-pull-secret
  # -- base64-encoded .dockerconfigjson value.
  #    Generate with:
  #      kubectl create secret docker-registry ghcr-pull-secret \
  #        --docker-server=ghcr.io \
  #        --docker-username=<USER> \
  #        --docker-password=<PAT> \
  #        --dry-run=client -o jsonpath='{.data.\.dockerconfigjson}'
  dockerconfigjson: ""

# -- Application version reported by GET /
appVersion: "0.2.0"

# -- HTTP port the container listens on
port: 8080

# S3 storage configuration — all backup data is written to S3 (no PVC needed).
s3:
  # -- S3-compatible endpoint URL. Leave empty to use AWS default endpoints.
  #    For MinIO: e.g. http://minio:9000
  endpoint: ""
  # -- S3 bucket name where backups are stored (required).
  bucket: "replic2-backups"
  # -- AWS region (required for AWS S3; can be any string for MinIO).
  region: "us-east-1"
  # -- Use path-style addressing (required for MinIO; set to "true").
  usePathStyle: "false"
  # -- S3 access key ID. Passed via a Secret; set the value in the Secret or at install time.
  accessKeyId: ""
  # -- S3 secret access key. Passed via a Secret; set the value in the Secret or at install time.
  secretAccessKey: ""

# Service configuration
service:
  # -- Service type
  type: NodePort
  # -- Port exposed by the Service
  port: 80
  # -- NodePort number (only used when type=NodePort). Leave 0 to let Kubernetes assign one.
  nodePort: 30080

# HPA configuration
autoscaling:
  # -- Enable the HorizontalPodAutoscaler
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  # -- Target CPU utilisation percentage
  targetCPUUtilizationPercentage: 70
  # -- Target memory utilisation percentage
  targetMemoryUtilizationPercentage: 80

# Resource requests and limits for the replic2 container
resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "128Mi"

# Liveness probe settings
livenessProbe:
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

# Readiness probe settings
readinessProbe:
  initialDelaySeconds: 3
  periodSeconds: 5
  failureThreshold: 3
