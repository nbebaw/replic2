{{- /* secret-s3.yaml — Kubernetes Secret holding all S3 connection parameters. */}}
{{- /* All S3 env vars in the Deployment are sourced from this Secret.           */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "replic2.fullname" . }}-s3
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "replic2.labels" . | nindent 4 }}
type: Opaque
stringData:
  # S3-compatible endpoint URL (empty = AWS default; set to MinIO URL for MinIO)
  endpoint: {{ .Values.s3.endpoint | quote }}
  # S3 bucket name where all backup data is stored
  bucket: {{ .Values.s3.bucket | quote }}
  # AWS region (any string for MinIO)
  region: {{ .Values.s3.region | quote }}
  # Path-style addressing — required for MinIO ("true"), not needed for AWS ("false")
  usePathStyle: {{ .Values.s3.usePathStyle | quote }}
  # S3 access key ID — provide at install time via --set s3.accessKeyId=<value>
  accessKeyId: {{ .Values.s3.accessKeyId | quote }}
  # S3 secret access key — provide at install time via --set s3.secretAccessKey=<value>
  secretAccessKey: {{ .Values.s3.secretAccessKey | quote }}
