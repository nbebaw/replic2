apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: scheduledbackups.replic2.io
  labels:
    app: replic2
spec:
  group: replic2.io
  names:
    kind: ScheduledBackup
    listKind: ScheduledBackupList
    plural: scheduledbackups
    singular: scheduledbackup
    shortNames:
      - sb
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Namespace
          type: string
          jsonPath: .spec.namespace
        - name: Schedule
          type: string
          jsonPath: .spec.schedule
        - name: KeepLast
          type: integer
          jsonPath: .spec.keepLast
        - name: LastRun
          type: date
          jsonPath: .status.lastScheduleTime
        - name: LastBackup
          type: string
          jsonPath: .status.lastBackupName
        - name: Active
          type: integer
          jsonPath: .status.activeBackups
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: ["spec"]
          properties:
            spec:
              type: object
              required: ["namespace", "schedule"]
              properties:
                namespace:
                  type: string
                  description: Kubernetes namespace to back up on each run.
                schedule:
                  type: string
                  description: Standard 5-field cron expression (e.g. "0 2 * * *"), interpreted as UTC.
                keepLast:
                  type: integer
                  minimum: 0
                  description: Number of most-recent Backup CRs to retain. 0 means keep all.
                ttl:
                  type: string
                  description: Optional Go duration (e.g. "24h") stamped on each generated Backup CR.
            status:
              type: object
              properties:
                lastScheduleTime:
                  type: string
                  format: date-time
                lastBackupName:
                  type: string
                activeBackups:
                  type: integer
                message:
                  type: string
