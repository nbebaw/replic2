apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: replic2
  namespace: replic2
  labels:
    app: replic2
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: replic2
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
